ruleset=🔰 节点选择,[]GEOSITE,spotify
ruleset=🔰 节点选择,[]GEOSITE,bahamut
ruleset=🔰 节点选择,[]GEOSITE,category-games
ruleset=🌍 国外媒体,[]GEOSITE,category-entertainment
ruleset=🔰 节点选择,[]GEOSITE,category-ecommerce
ruleset=🔰 节点选择,[]GEOSITE,gfw
ruleset=📲 电报信息,[]GEOIP,telegram,no-resolve
ruleset=🌍 国外媒体,[]GEOIP,twitter,no-resolve
ruleset=🌍 国外媒体,[]GEOIP,facebook,no-resolve
ruleset=🔰 节点选择,[]GEOIP,google,no-resolve
ruleset=🎥 NETFLIX,[]GEOIP,netflix,no-resolve
;国内域名兜底
