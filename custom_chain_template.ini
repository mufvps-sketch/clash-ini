;Custom_Chain_Subconverter_Template
;链式代理自定义模板 - 按国家自动优选
;用法：将此文件上传到 GitHub，然后在 Chain-Subconverter 的"订阅转换模板"框中填入 raw 链接

[custom]

;本地地址和域名直连
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,28800
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

;代理规则
ruleset=手动选择,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800
ruleset=手动选择,[]GEOSITE,gfw
ruleset=手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800
ruleset=手动选择,[]FINAL

;=============================================================================
;设置节点分组标志位
;=============================================================================
custom_proxy_group=手动选择`select`[]自动选择`[]美国节点`[]菲律宾节点`[]日本节点`[]DIRECT`.*
custom_proxy_group=自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=美国节点`url-test`美国|华盛顿|US|USA|America|United States`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=菲律宾节点`url-test`菲律宾|马尼拉|PH|Philippines|Manila`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=日本节点`url-test`东京|Japan|NRT|HND|KIX|TYO`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=DIRECT`select`[]DIRECT

;下方参数请勿修改
enable_rule_generator=true
overwrite_original_rules=true
